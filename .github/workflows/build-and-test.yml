name: Build and Test
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore src/MechanicShop.Api/MechanicShop.Api.csproj

    - name: Build solution
      run: dotnet build src/MechanicShop.Api/MechanicShop.Api.csproj --configuration Release --no-restore